<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hisse Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #14171c;
    --surface2: #1c2028;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #7a8099;
    --faint: #3a3f50;
    --green: #00c98d;
    --green-bg: rgba(0,201,141,0.1);
    --red: #ff5c5c;
    --red-bg: rgba(255,92,92,0.1);
    --accent: #4f8cff;
    --accent-bg: rgba(79,140,255,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    padding: 0;
    line-height: 1.5;
  }

  /* NAV */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,18,0.92);
    backdrop-filter: blur(12px);
  }
  .nav-brand { font-size: 15px; font-weight: 700; letter-spacing: 0.06em; color: var(--text); }
  .nav-brand span { color: var(--accent); }
  .nav-actions { display: flex; gap: 8px; align-items: center; }
  .btn-ghost {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--faint); }
  .btn-primary {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* LAYOUT */
  .container { max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; }

  /* TICKER PILLS */
  .ticker-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .ticker-pill {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .ticker-pill:hover { border-color: var(--faint); color: var(--text); }
  .ticker-pill.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .ticker-pill.add {
    border-style: dashed;
    color: var(--faint);
    border-color: var(--faint);
    background: transparent;
  }
  .ticker-pill.add:hover { color: var(--muted); border-color: var(--muted); }

  /* MAIN GRID */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 760px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card + .card { margin-top: 16px; }

  /* HISSE HEADER */
  .hisse-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .hisse-ticker { font-family: var(--font-mono); font-size: 26px; font-weight: 500; color: var(--text); letter-spacing: 0.03em; }
  .hisse-name { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .price-block { text-align: right; }
  .price-val { font-family: var(--font-mono); font-size: 28px; font-weight: 500; color: var(--text); }
  .price-chg {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 5px;
    font-weight: 500;
  }
  .price-chg.up { background: var(--green-bg); color: var(--green); }
  .price-chg.down { background: var(--red-bg); color: var(--red); }

  /* METRICS */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
  }
  .metric {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .metric-label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
  .metric-val { font-family: var(--font-mono); font-size: 14px; color: var(--text); font-weight: 500; }

  /* CHART TABS */
  .chart-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .tab-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.13s;
    letter-spacing: 0.04em;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); }
  .tab-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }

  /* CHART */
  .chart-wrap { position: relative; height: 200px; }

  /* SAĞ PANEL - YORUMLAR */
  .panel-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .comment-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; margin-bottom: 14px; padding-right: 2px; }
  .comment-list::-webkit-scrollbar { width: 3px; }
  .comment-list::-webkit-scrollbar-track { background: transparent; }
  .comment-list::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }
  .comment-item {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    border-left: 2px solid transparent;
    position: relative;
    animation: fadeUp 0.2s ease;
  }
  .comment-item.bull { border-left-color: var(--green); }
  .comment-item.bear { border-left-color: var(--red); }
  .comment-item.neutral { border-left-color: var(--faint); }
  .comment-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .sentiment-label { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
  .sentiment-label.bull { color: var(--green); }
  .sentiment-label.bear { color: var(--red); }
  .sentiment-label.neutral { color: var(--muted); }
  .comment-date { font-family: var(--font-mono); font-size: 10px; color: var(--faint); }
  .comment-price-tag { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-bottom: 5px; }
  .comment-text { font-size: 13px; color: var(--text); line-height: 1.55; }
  .del-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--red); }
  .empty-state { font-size: 12px; color: var(--faint); text-align: center; padding: 20px 0; }

  /* FORM */
  .form-section { border-top: 1px solid var(--border); padding-top: 14px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .form-select, .form-input {
    font-family: var(--font-display);
    font-size: 12px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    flex: 1;
    min-width: 100px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-select:focus, .form-input:focus { border-color: var(--accent); }
  .form-textarea {
    font-family: var(--font-display);
    font-size: 13px;
    width: 100%;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .form-textarea:focus { border-color: var(--accent); }
  .form-submit {
    width: 100%;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    padding: 9px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--accent);
    background: var(--accent-bg);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .form-submit:hover { background: var(--accent); color: #fff; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 24px;
    width: min(400px, 90vw);
    animation: fadeUp 0.2s ease;
  }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 10px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions button { flex: 1; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">HISSE<span>.</span>TAKİP</div>
  <div class="nav-actions">
    <button class="btn-ghost" id="exportBtn">JSON Dışa Aktar</button>
    <button class="btn-ghost" id="importBtn">İçe Aktar</button>
    <button class="btn-primary" id="openAddModal">+ Hisse Ekle</button>
  </div>
</nav>

<div class="container">
  <div class="ticker-bar" id="tickerBar"></div>
  <div class="main-grid">
    <div>
      <div class="card" id="mainCard">
        <div class="hisse-header">
          <div>
            <div class="hisse-ticker" id="dispTicker">—</div>
            <div class="hisse-name" id="dispName">Hisse seçin</div>
          </div>
          <div class="price-block">
            <div class="price-val" id="dispPrice">—</div>
            <div class="price-chg up" id="dispChg">—</div>
          </div>
        </div>
        <div class="metrics-row" id="metricsRow"></div>
        <div class="chart-tabs" id="chartTabs">
          <button class="tab-btn active" data-r="1W">1H</button>
          <button class="tab-btn" data-r="1M">1A</button>
          <button class="tab-btn" data-r="3M">3A</button>
          <button class="tab-btn" data-r="6M">6A</button>
          <button class="tab-btn" data-r="1Y">1Y</button>
        </div>
        <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="panel-title">Yorumlarım</div>
        <div class="comment-list" id="commentList"></div>
        <div class="form-section">
          <div class="form-row">
            <select class="form-select" id="sentimentSel">
              <option value="bull">▲ Yükseliş</option>
              <option value="bear">▼ Düşüş</option>
              <option value="neutral">→ Nötr</option>
            </select>
            <input class="form-input" id="priceInput" type="text" placeholder="Fiyat (₺)" />
          </div>
          <textarea class="form-textarea" id="commentText" placeholder="Yorumunuzu yazın..."></textarea>
          <button class="form-submit" id="addCommentBtn">Yorum Ekle</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Hisse Ekle -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Hisse Ekle</div>
    <label>Hisse Kodu *</label>
    <input class="form-input" id="m_code" placeholder="THYAO" style="width:100%" />
    <label>Hisse Adı *</label>
    <input class="form-input" id="m_name" placeholder="Türk Hava Yolları" style="width:100%" />
    <label>Güncel Fiyat (₺) *</label>
    <input class="form-input" id="m_price" type="number" placeholder="298.50" style="width:100%" />
    <label>Borsa</label>
    <input class="form-input" id="m_exchange" placeholder="BIST" style="width:100%" />
    <div class="modal-actions">
      <button class="btn-ghost" id="closeModal">İptal</button>
      <button class="btn-primary" id="saveModal">Kaydet</button>
    </div>
  </div>
</div>

<!-- Modal: Import -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">JSON İçe Aktar</div>
    <label>Daha önce dışa aktardığınız JSON'u yapıştırın</label>
    <textarea class="form-textarea" id="importText" style="min-height:120px;margin-top:8px" placeholder='{"stocks":{...},"comments":{}}'></textarea>
    <div class="modal-actions">
      <button class="btn-ghost" id="closeImport">İptal</button>
      <button class="btn-primary" id="doImport">İçe Aktar</button>
    </div>
  </div>
</div>

<script>
// ── STORAGE ────────────────────────────────────────────────
const LS_STOCKS   = 'ht_stocks_v2';
const LS_COMMENTS = 'ht_comments_v2';
const LS_RANGE    = 'ht_range_v2';
const LS_CURRENT  = 'ht_current_v2';

const DEFAULT_STOCKS = {
  THYAO: { name: 'Türk Hava Yolları', price: 298, exchange: 'BIST', vol: 12 },
  GARAN: { name: 'Garanti Bankası',    price: 142, exchange: 'BIST', vol: 6  },
  EREGL: { name: 'Ereğli Demir Çelik',price: 67,  exchange: 'BIST', vol: 4  },
  ASELS: { name: 'Aselsan',            price: 83,  exchange: 'BIST', vol: 5  },
  KCHOL: { name: 'Koç Holding',        price: 191, exchange: 'BIST', vol: 9  },
};

function loadStocks()   { try { return JSON.parse(localStorage.getItem(LS_STOCKS))   || {...DEFAULT_STOCKS}; } catch { return {...DEFAULT_STOCKS}; } }
function loadComments() { try { return JSON.parse(localStorage.getItem(LS_COMMENTS)) || {}; } catch { return {}; } }
function saveStocks(s)   { localStorage.setItem(LS_STOCKS,   JSON.stringify(s)); }
function saveComments(c) { localStorage.setItem(LS_COMMENTS, JSON.stringify(c)); }

let stocks   = loadStocks();
let comments = loadComments();
let current  = localStorage.getItem(LS_CURRENT) || Object.keys(stocks)[0];
let range    = localStorage.getItem(LS_RANGE)   || '1W';
let chart    = null;

// ── PRICE SIMULATION ───────────────────────────────────────
function generatePrices(ticker, r) {
  const s = stocks[ticker];
  if (!s) return [];
  const counts = { '1W':7,'1M':30,'3M':90,'6M':180,'1Y':365 };
  const n = counts[r] || 7;
  const vol = s.vol || s.price * 0.04;
  let p = s.price * (0.88 + Math.random() * 0.1);
  const seed = ticker.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const prices = [];
  for (let i = 0; i < n; i++) {
    p += (Math.random() - 0.48) * vol * (1 + Math.sin(i * 0.28 + seed * 0.1) * 0.35);
    p = Math.max(p, s.price * 0.5);
    prices.push(+p.toFixed(2));
  }
  prices[prices.length - 1] = s.price;
  return prices;
}
function generateLabels(r) {
  const counts = { '1W':7,'1M':30,'3M':90,'6M':180,'1Y':365 };
  const n = counts[r] || 7;
  const labels = [];
  const now = new Date();
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate()-i);
    if (n<=7)  labels.push(d.toLocaleDateString('tr-TR',{weekday:'short'}));
    else if (n<=31) labels.push(d.toLocaleDateString('tr-TR',{day:'2-digit',month:'short'}));
    else       labels.push(d.toLocaleDateString('tr-TR',{month:'short',day:'2-digit'}));
  }
  return labels;
}

// ── RENDER TICKERS ─────────────────────────────────────────
function renderTickers() {
  const bar = document.getElementById('tickerBar');
  bar.innerHTML = '';
  Object.keys(stocks).forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'ticker-pill' + (t === current ? ' active' : '');
    btn.textContent = t;
    btn.title = stocks[t].name;
    btn.addEventListener('click', () => { current = t; localStorage.setItem(LS_CURRENT, t); renderAll(); });
    bar.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'ticker-pill add';
  add.textContent = '+ Ekle';
  add.addEventListener('click', () => openModal('addModal'));
  bar.appendChild(add);
}

// ── RENDER HEADER ──────────────────────────────────────────
function renderHeader() {
  const s = stocks[current];
  if (!s) return;
  const prices = generatePrices(current, '1W');
  const cur = prices[prices.length-1];
  const prev = prices[prices.length-2] || cur;
  const chgPct = ((cur-prev)/prev*100).toFixed(2);
  const isUp = +chgPct >= 0;

  document.getElementById('dispTicker').textContent = current;
  document.getElementById('dispName').textContent = s.name + (s.exchange ? '  ·  ' + s.exchange : '');
  document.getElementById('dispPrice').textContent = cur.toFixed(2) + ' ₺';
  const badge = document.getElementById('dispChg');
  badge.textContent = (isUp?'+':'') + chgPct + '%';
  badge.className = 'price-chg ' + (isUp?'up':'down');

  const allP = generatePrices(current, '1Y');
  const hi = Math.max(...allP).toFixed(2);
  const lo = Math.min(...allP).toFixed(2);
  const vol = (Math.random()*900+100).toFixed(0) + 'M ₺';
  const pe  = (Math.random()*15+5).toFixed(1);
  const mktcap = (cur*(Math.random()*50+10)).toFixed(1)+'Bn';

  document.getElementById('metricsRow').innerHTML = [
    {label:'52H Yüksek', val: hi+' ₺'},
    {label:'52H Düşük',  val: lo+' ₺'},
    {label:'Hacim',      val: vol},
    {label:'F/K Oranı',  val: pe+'x'},
    {label:'Piy. Değeri',val: mktcap},
  ].map(m=>`<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-val">${m.val}</div></div>`).join('');
}

// ── RENDER CHART ───────────────────────────────────────────
function renderChart() {
  const prices = generatePrices(current, range);
  const labels = generateLabels(range);
  const isUp = prices[prices.length-1] >= prices[0];
  const color = isUp ? '#00c98d' : '#ff5c5c';
  if (chart) { chart.destroy(); chart = null; }
  const ctx = document.getElementById('priceChart').getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0, isUp ? 'rgba(0,201,141,0.18)' : 'rgba(255,92,92,0.18)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: prices,
        borderColor: color,
        borderWidth: 1.5,
        backgroundColor: grad,
        fill: true,
        tension: 0.38,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: color,
        pointHoverBorderColor: '#0d0f12',
        pointHoverBorderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2028',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#7a8099',
          bodyColor: '#e8eaf0',
          bodyFont: { family: 'DM Mono', size: 13 },
          callbacks: { label: c => c.parsed.y.toFixed(2) + ' ₺' }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { color: '#3a3f50', font: { size: 11, family: 'DM Mono' }, maxTicksLimit: 7, maxRotation: 0 }
        },
        y: {
          position: 'right',
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { display: false },
          ticks: { color: '#3a3f50', font: { size: 11, family: 'DM Mono' }, callback: v => v.toFixed(0)+'₺' }
        }
      }
    }
  });
}

// ── RENDER COMMENTS ────────────────────────────────────────
function renderComments() {
  const list = document.getElementById('commentList');
  const tc = (comments[current] || []).slice().reverse();
  if (!tc.length) {
    list.innerHTML = '<div class="empty-state">Bu hisse için henüz yorum eklenmedi.</div>';
    return;
  }
  list.innerHTML = tc.map((c,ri) => {
    const i = (comments[current].length-1) - ri;
    const sl = c.sentiment==='bull'?'Yükseliş':c.sentiment==='bear'?'Düşüş':'Nötr';
    return `<div class="comment-item ${c.sentiment}">
      <button class="del-btn" data-i="${i}" title="Sil">×</button>
      <div class="comment-meta">
        <span class="sentiment-label ${c.sentiment}">${sl}</span>
        <span class="comment-date">${c.date}</span>
      </div>
      ${c.price?`<div class="comment-price-tag">@ ${c.price} ₺</div>`:''}
      <div class="comment-text">${escHtml(c.text)}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.i;
      if (!comments[current]) return;
      comments[current].splice(idx, 1);
      saveComments(comments);
      renderComments();
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── ADD COMMENT ────────────────────────────────────────────
document.getElementById('addCommentBtn').addEventListener('click', () => {
  const text = document.getElementById('commentText').value.trim();
  if (!text) return;
  if (!current) return;
  const sentiment = document.getElementById('sentimentSel').value;
  const price = document.getElementById('priceInput').value.trim();
  const now = new Date();
  const date = now.toLocaleDateString('tr-TR',{day:'2-digit',month:'short',year:'numeric'});
  if (!comments[current]) comments[current] = [];
  comments[current].push({ text, sentiment, price, date, ts: now.getTime() });
  saveComments(comments);
  document.getElementById('commentText').value = '';
  document.getElementById('priceInput').value = '';
  renderComments();
});

// ── CHART TABS ─────────────────────────────────────────────
document.getElementById('chartTabs').addEventListener('click', e => {
  if (!e.target.dataset.r) return;
  range = e.target.dataset.r;
  localStorage.setItem(LS_RANGE, range);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.r === range));
  renderChart();
});

// ── MODAL ──────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('openAddModal').addEventListener('click', () => openModal('addModal'));
document.getElementById('closeModal').addEventListener('click',   () => closeModal('addModal'));
document.getElementById('addModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal('addModal'); });

document.getElementById('saveModal').addEventListener('click', () => {
  const code = document.getElementById('m_code').value.trim().toUpperCase();
  const name = document.getElementById('m_name').value.trim();
  const price = parseFloat(document.getElementById('m_price').value);
  const exchange = document.getElementById('m_exchange').value.trim() || 'BIST';
  if (!code || !name || isNaN(price)) { alert('Lütfen zorunlu alanları doldurun.'); return; }
  stocks[code] = { name, price, exchange, vol: price * 0.04 };
  saveStocks(stocks);
  current = code;
  localStorage.setItem(LS_CURRENT, current);
  ['m_code','m_name','m_price','m_exchange'].forEach(id => document.getElementById(id).value = '');
  closeModal('addModal');
  renderAll();
});

// ── EXPORT / IMPORT ────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', () => {
  const data = JSON.stringify({ stocks, comments }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hisse-takip-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
});

document.getElementById('importBtn').addEventListener('click', () => openModal('importModal'));
document.getElementById('closeImport').addEventListener('click', () => closeModal('importModal'));
document.getElementById('importModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal('importModal'); });

document.getElementById('doImport').addEventListener('click', () => {
  try {
    const raw = document.getElementById('importText').value.trim();
    const data = JSON.parse(raw);
    if (data.stocks) { stocks = data.stocks; saveStocks(stocks); }
    if (data.comments) { comments = data.comments; saveComments(comments); }
    current = Object.keys(stocks)[0];
    localStorage.setItem(LS_CURRENT, current);
    document.getElementById('importText').value = '';
    closeModal('importModal');
    renderAll();
  } catch(e) { alert('Geçersiz JSON formatı.'); }
});

// ── INIT ───────────────────────────────────────────────────
function renderAll() {
  if (!stocks[current]) current = Object.keys(stocks)[0];
  renderTickers();
  renderHeader();
  renderChart();
  renderComments();
}

// Sync active tab button
document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.r === range));
renderAll();
</script>
</body>
</html>
