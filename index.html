<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hisse Takip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0f12;--surface:#14171c;--surface2:#1c2028;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#e8eaf0;--muted:#7a8099;--faint:#3a3f50;
  --green:#00c98d;--green-bg:rgba(0,201,141,.1);
  --red:#ff5c5c;--red-bg:rgba(255,92,92,.1);
  --accent:#4f8cff;--accent-bg:rgba(79,140,255,.1);
  --radius:12px;--radius-sm:8px;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5;}
button{font-family:var(--font);cursor:pointer;border-radius:var(--radius-sm);transition:all .15s;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(13,15,18,.94);backdrop-filter:blur(12px);gap:10px;flex-wrap:wrap;}
.nav-brand{font-size:15px;font-weight:700;letter-spacing:.06em;flex-shrink:0;}
.nav-brand span{color:var(--accent);}
.nav-right{display:flex;gap:10px;align-items:center;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background .3s;}
.status-dot.online{background:var(--green);}
.status-dot.error{background:var(--red);}
.status-dot.syncing{background:var(--accent);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.status-label{font-size:11px;color:var(--muted);}

.btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--radius-sm);}
.btn-ghost{border:1px solid var(--border2);background:transparent;color:var(--muted);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{border:none;background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.85;}
.btn-danger{font-size:11px;padding:4px 10px;border:1px solid rgba(255,92,92,.3);background:transparent;color:var(--red);}
.btn-danger:hover{background:var(--red-bg);}

.container{max-width:1000px;margin:0 auto;padding:20px 14px 60px;}

.ticker-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.ticker-pill{font-family:var(--mono);font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.ticker-pill:hover{border-color:var(--faint);color:var(--text);}
.ticker-pill.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.ticker-pill.add-pill{border-style:dashed;color:var(--faint);border-color:var(--faint);background:transparent;}
.ticker-pill.add-pill:hover{color:var(--muted);border-color:var(--muted);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;animation:fadeUp .22s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.card+.card{margin-top:14px;}

.main-grid{display:grid;grid-template-columns:1fr 310px;gap:14px;align-items:start;}
@media(max-width:700px){.main-grid{grid-template-columns:1fr;}}

.hisse-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.hisse-ticker{font-family:var(--mono);font-size:24px;font-weight:500;}
.hisse-name{font-size:13px;color:var(--muted);margin-top:2px;}
.price-block{text-align:right;}
.price-val{font-family:var(--mono);font-size:26px;font-weight:500;}
.price-chg{display:inline-block;font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:20px;margin-top:4px;font-weight:500;}
.price-chg.up{background:var(--green-bg);color:var(--green);}
.price-chg.down{background:var(--red-bg);color:var(--red);}

.update-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);}
.update-row label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.price-field{font-family:var(--mono);font-size:14px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);color:var(--text);width:115px;outline:none;}
.price-field:focus{border-color:var(--accent);}

.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.section-title{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.chart-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:border-color .15s;}
.chart-card:hover{border-color:var(--border2);}
.chart-card img{width:100%;display:block;max-height:130px;object-fit:cover;cursor:zoom-in;}
.chart-card-footer{padding:6px 10px;display:flex;align-items:center;justify-content:space-between;}
.chart-label{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;}
.chart-del{background:none;border:none;color:var(--faint);font-size:16px;line-height:1;padding:0 2px;cursor:pointer;}
.chart-del:hover{color:var(--red);}
.upload-box{background:var(--surface2);border:1px dashed var(--faint);border-radius:var(--radius-sm);padding:18px 12px;text-align:center;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-height:100px;}
.upload-box:hover{border-color:var(--accent);background:var(--accent-bg);}
.upload-box svg{opacity:.4;}
.upload-box span{font-size:12px;color:var(--muted);}
.upload-box small{font-size:10px;color:var(--faint);}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.lightbox.open{display:flex;}
.lightbox img{max-width:94vw;max-height:90vh;border-radius:var(--radius);object-fit:contain;}
.lb-close{position:fixed;top:16px;right:20px;font-size:30px;color:var(--muted);background:none;border:none;cursor:pointer;line-height:1;padding:4px 8px;}
.lb-close:hover{color:var(--text);}

.comment-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;margin-bottom:12px;padding-right:2px;}
.comment-list::-webkit-scrollbar{width:3px;}
.comment-list::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px;}
.comment-item{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;border-left:2px solid transparent;position:relative;}
.comment-item.bull{border-left-color:var(--green);}
.comment-item.bear{border-left-color:var(--red);}
.comment-item.neutral{border-left-color:var(--faint);}
.comment-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.sent-label{font-size:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:500;}
.sent-label.bull{color:var(--green);}.sent-label.bear{color:var(--red);}.sent-label.neutral{color:var(--muted);}
.comment-date{font-family:var(--mono);font-size:10px;color:var(--faint);}
.comment-price-tag{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px;}
.comment-text{font-size:13px;color:var(--text);line-height:1.55;}
.del-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--faint);font-size:14px;line-height:1;padding:2px 4px;cursor:pointer;}
.del-btn:hover{color:var(--red);}
.empty-state{font-size:12px;color:var(--faint);text-align:center;padding:18px 0;}

.form-section{border-top:1px solid var(--border);padding-top:12px;}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-select,.form-input{font-family:var(--font);font-size:12px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);flex:1;min-width:90px;outline:none;}
.form-select:focus,.form-input:focus{border-color:var(--accent);}
.form-textarea{font-family:var(--font);font-size:13px;width:100%;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);resize:vertical;min-height:75px;outline:none;margin-bottom:8px;line-height:1.5;}
.form-textarea:focus{border-color:var(--accent);}
.form-submit{width:100%;font-size:13px;font-weight:500;padding:9px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);}
.form-submit:hover{background:var(--accent);color:#fff;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;width:min(400px,92vw);animation:fadeUp .2s ease;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.modal label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;margin-top:10px;}
.modal .form-input{width:100%;display:block;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.modal-actions button{flex:1;padding:9px;font-size:13px;}

.no-stock{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
.no-stock .icon{font-size:36px;opacity:.2;margin-bottom:12px;}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">HİSSE<span>.</span>TAKİP</div>
  <div class="nav-right">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Bağlanıyor…</span>
    <button class="btn btn-primary" id="openAddModal">+ Hisse Ekle</button>
  </div>
</nav>

<div class="container">
  <div class="ticker-bar" id="tickerBar"></div>
  <div id="stockView"><div class="loading">Yükleniyor…</div></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">×</button>
  <img id="lbImg" src="" alt=""/>
</div>

<!-- Modal: Hisse Ekle -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Yeni Hisse Ekle</div>
    <label>Hisse Kodu *</label>
    <input class="form-input" id="m_code" placeholder="THYAO"/>
    <label>Şirket Adı *</label>
    <input class="form-input" id="m_name" placeholder="Türk Hava Yolları"/>
    <label>Güncel Fiyat (₺)</label>
    <input class="form-input" id="m_price" type="number" step="0.01" placeholder="298.50"/>
    <label>Borsa</label>
    <input class="form-input" id="m_exchange" placeholder="BIST"/>
    <label>Not (opsiyonel)</label>
    <input class="form-input" id="m_note" placeholder="Kısa not..."/>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="closeAddModal">İptal</button>
      <button class="btn btn-primary" id="saveModal">Kaydet</button>
    </div>
  </div>
</div>

<input type="file" id="chartFileInput" accept="image/*" multiple style="display:none"/>

<script>
const SUPABASE_URL = 'https://yadjyjpfrxcqhonzgjln.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jzBUDqVWkgcOi8MLmXSuVg_z9jYV4-B';

const api = (path, opts={}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || '',
    ...(opts.headers||{})
  },
  ...opts
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let stocks=[], comments=[], charts=[];
let current='';

// ── STATUS ───────────────────────────────────────────────
function setStatus(state, label){
  const dot=document.getElementById('statusDot');
  const lbl=document.getElementById('statusLabel');
  dot.className='status-dot '+(state||'');
  lbl.textContent=label;
}

// ── FETCH ALL ────────────────────────────────────────────
async function fetchAll(){
  setStatus('syncing','Senkronize ediliyor…');
  try{
    const [sRes,cRes,gRes] = await Promise.all([
      api('stocks?order=id'),
      api('comments?order=ts'),
      api('charts?order=id'),
    ]);
    if(!sRes.ok) throw new Error('stocks: '+sRes.status);
    stocks   = await sRes.json();
    comments = await cRes.json();
    charts   = await gRes.json();
    if(!current && stocks.length) current=stocks[0].id;
    setStatus('online','Bağlı');
    renderAll();
  }catch(e){
    setStatus('error','Bağlantı hatası');
    console.error(e);
    document.getElementById('stockView').innerHTML='<div class="no-stock"><div class="icon">⚠️</div>Supabase\'e bağlanılamadı.<br><small style="font-size:11px;color:var(--faint)">'+e.message+'</small></div>';
  }
}

// ── TICKERS ──────────────────────────────────────────────
function renderTickers(){
  const bar=document.getElementById('tickerBar');
  bar.innerHTML='';
  stocks.forEach(s=>{
    const b=document.createElement('button');
    b.className='ticker-pill'+(s.id===current?' active':'');
    b.textContent=s.id; b.title=s.name;
    b.onclick=()=>{current=s.id;renderAll();};
    bar.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='ticker-pill add-pill';add.textContent='+ Ekle';
  add.onclick=()=>openM('addModal');
  bar.appendChild(add);
}

// ── STOCK VIEW ───────────────────────────────────────────
function renderStockView(){
  const view=document.getElementById('stockView');
  const s=stocks.find(x=>x.id===current);
  if(!s){
    view.innerHTML='<div class="no-stock"><div class="icon">📊</div>Henüz hisse eklenmedi.</div>';
    return;
  }
  const price=s.price!=null?parseFloat(s.price):null;
  const prev=s.prev_price!=null?parseFloat(s.prev_price):null;
  let chgHtml='';
  if(price!==null&&prev!==null&&prev!==0){
    const p=((price-prev)/prev*100).toFixed(2);
    chgHtml=`<div class="price-chg ${+p>=0?'up':'down'}">${+p>=0?'+':''}${p}%</div>`;
  }
  view.innerHTML=`
  <div class="main-grid">
    <div>
      <div class="card">
        <div class="hisse-header">
          <div>
            <div class="hisse-ticker">${esc(s.id)}</div>
            <div class="hisse-name">${esc(s.name)}${s.exchange?' · '+esc(s.exchange):''}</div>
          </div>
          <div class="price-block">
            <div class="price-val">${price!==null?price.toFixed(2)+' ₺':'—'}</div>
            ${chgHtml}
          </div>
        </div>
        <div class="update-row">
          <label>Fiyat güncelle</label>
          <input type="number" class="price-field" id="newPrice" step="0.01" placeholder="Yeni fiyat" value="${price!==null?price:''}"/>
          <button class="btn btn-ghost" id="updatePriceBtn" style="font-size:12px;padding:6px 12px">Kaydet</button>
          <button class="btn-danger" id="deleteStockBtn" style="margin-left:auto">Hisseyi Sil</button>
        </div>
        ${s.note?`<div style="font-size:12px;color:var(--muted);margin-bottom:14px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm);border-left:2px solid var(--faint)">${esc(s.note)}</div>`:''}
        <div class="divider"></div>
        <div class="section-title">Grafik Görüntüleri</div>
        <div class="charts-grid" id="chartsGrid"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="section-title">Yorumlarım</div>
        <div class="comment-list" id="commentList"></div>
        <div class="form-section">
          <div class="form-row">
            <select class="form-select" id="sentimentSel">
              <option value="bull">▲ Yükseliş</option>
              <option value="bear">▼ Düşüş</option>
              <option value="neutral">→ Nötr</option>
            </select>
            <input class="form-input" id="priceInput" type="number" step="0.01" placeholder="@ Fiyat (₺)"/>
          </div>
          <textarea class="form-textarea" id="commentText" placeholder="Notunuzu yazın..."></textarea>
          <button class="form-submit" id="addCommentBtn">Yorum Ekle</button>
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('updatePriceBtn').onclick=async()=>{
    const val=document.getElementById('newPrice').value.trim();
    const n=val!==''?parseFloat(val):null;
    if(val!==''&&isNaN(n))return;
    setStatus('syncing','Kaydediliyor…');
    await api(`stocks?id=eq.${current}`,{
      method:'PATCH', prefer:'return=minimal',
      body:JSON.stringify({price:n, prev_price:s.price, updated_at:new Date().toISOString()})
    });
    await fetchAll();
  };

  document.getElementById('deleteStockBtn').onclick=async()=>{
    if(!confirm(current+' hissesini silmek istiyor musunuz?'))return;
    setStatus('syncing','Siliniyor…');
    await Promise.all([
      api(`stocks?id=eq.${current}`,{method:'DELETE'}),
      api(`comments?ticker=eq.${current}`,{method:'DELETE'}),
      api(`charts?ticker=eq.${current}`,{method:'DELETE'}),
    ]);
    current='';
    await fetchAll();
  };

  document.getElementById('addCommentBtn').onclick=addComment;
  renderCharts();
  renderComments();
}

// ── CHARTS ───────────────────────────────────────────────
function renderCharts(){
  const grid=document.getElementById('chartsGrid');
  if(!grid)return;
  const list=charts.filter(c=>c.ticker===current);
  grid.innerHTML=list.map(c=>`
    <div class="chart-card">
      <img src="${c.data_url}" alt="${esc(c.label)}" />
      <div class="chart-card-footer">
        <span class="chart-label" title="${esc(c.label)}">${esc(c.label)}</span>
        <button class="chart-del" data-id="${c.id}">×</button>
      </div>
    </div>`).join('')+`
  <div class="upload-box" id="uploadBox">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <span>Grafik yükle</span>
    <small>PNG · JPG · birden fazla seçilebilir</small>
  </div>`;

  grid.querySelectorAll('.chart-card img').forEach(img=>{
    img.onclick=()=>{document.getElementById('lbImg').src=img.src;document.getElementById('lightbox').classList.add('open');};
  });
  grid.querySelectorAll('.chart-del').forEach(btn=>{
    btn.onclick=async e=>{
      e.stopPropagation();
      setStatus('syncing','Siliniyor…');
      await api(`charts?id=eq.${btn.dataset.id}`,{method:'DELETE'});
      await fetchAll();
    };
  });
  document.getElementById('uploadBox').onclick=()=>document.getElementById('chartFileInput').click();
}

document.getElementById('chartFileInput').onchange=async function(){
  const files=Array.from(this.files);if(!files.length)return;
  setStatus('syncing','Yükleniyor…');
  const reads=files.map(file=>new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res({ticker:current,label:file.name.replace(/\.[^.]+$/,'').slice(0,50),data_url:e.target.result});
    r.readAsDataURL(file);
  }));
  const rows=await Promise.all(reads);
  await api('charts',{
    method:'POST', prefer:'return=minimal',
    body:JSON.stringify(rows)
  });
  this.value='';
  await fetchAll();
};

document.getElementById('lbClose').onclick=()=>document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').onclick=function(e){if(e.target===this)this.classList.remove('open');};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('lightbox').classList.remove('open');closeM('addModal');}});

// ── COMMENTS ─────────────────────────────────────────────
function renderComments(){
  const list=document.getElementById('commentList');
  if(!list)return;
  const tc=comments.filter(c=>c.ticker===current).slice().reverse();
  if(!tc.length){list.innerHTML='<div class="empty-state">Henüz yorum eklenmedi.</div>';return;}
  list.innerHTML=tc.map(c=>{
    const sl=c.sentiment==='bull'?'Yükseliş':c.sentiment==='bear'?'Düşüş':'Nötr';
    return `<div class="comment-item ${c.sentiment}">
      <button class="del-btn" data-id="${c.id}">×</button>
      <div class="comment-meta">
        <span class="sent-label ${c.sentiment}">${sl}</span>
        <span class="comment-date">${c.date}</span>
      </div>
      ${c.price?`<div class="comment-price-tag">@ ${esc(c.price)} ₺</div>`:''}
      <div class="comment-text">${esc(c.text).replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.del-btn').forEach(btn=>{
    btn.onclick=async()=>{
      setStatus('syncing','Siliniyor…');
      await api(`comments?id=eq.${btn.dataset.id}`,{method:'DELETE'});
      await fetchAll();
    };
  });
}

async function addComment(){
  const text=document.getElementById('commentText').value.trim();
  if(!text||!current)return;
  const sentiment=document.getElementById('sentimentSel').value;
  const price=document.getElementById('priceInput').value.trim();
  const date=new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'short',year:'numeric'});
  setStatus('syncing','Kaydediliyor…');
  await api('comments',{
    method:'POST', prefer:'return=minimal',
    body:JSON.stringify({ticker:current,text,sentiment,price,date,ts:Date.now()})
  });
  document.getElementById('commentText').value='';
  document.getElementById('priceInput').value='';
  await fetchAll();
}

// ── MODALS ───────────────────────────────────────────────
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}

document.getElementById('openAddModal').onclick=()=>openM('addModal');
document.getElementById('closeAddModal').onclick=()=>closeM('addModal');
document.getElementById('addModal').onclick=e=>{if(e.target===e.currentTarget)closeM('addModal');};

document.getElementById('saveModal').onclick=async()=>{
  const code=document.getElementById('m_code').value.trim().toUpperCase();
  const name=document.getElementById('m_name').value.trim();
  if(!code||!name){alert('Hisse kodu ve isim zorunludur.');return;}
  const price=document.getElementById('m_price').value.trim();
  const exchange=document.getElementById('m_exchange').value.trim()||'BIST';
  const note=document.getElementById('m_note').value.trim();
  setStatus('syncing','Kaydediliyor…');
  await api('stocks',{
    method:'POST', prefer:'resolution=merge-duplicates,return=minimal',
    body:JSON.stringify({id:code,name,price:price!==''?parseFloat(price):null,prev_price:null,exchange,note})
  });
  current=code;
  ['m_code','m_name','m_price','m_exchange','m_note'].forEach(id=>document.getElementById(id).value='');
  closeM('addModal');
  await fetchAll();
};

// ── REALTIME (polling) ───────────────────────────────────
// Her 30 saniyede bir otomatik senkronize et
setInterval(fetchAll, 30000);

// ── INIT ─────────────────────────────────────────────────
function renderAll(){
  if(!stocks.find(x=>x.id===current)&&stocks.length) current=stocks[0].id;
  renderTickers();
  renderStockView();
}

fetchAll();
</script>
</body>
</html>
