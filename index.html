<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hisse Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0d0f12; --surface: #14171c; --surface2: #1c2028;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0; --muted: #7a8099; --faint: #3a3f50;
  --green: #00c98d; --green-bg: rgba(0,201,141,0.1);
  --red: #ff5c5c; --red-bg: rgba(255,92,92,0.1);
  --accent: #4f8cff; --accent-bg: rgba(79,140,255,0.1);
  --radius: 12px; --radius-sm: 8px;
  --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5;}
button{font-family:var(--font);cursor:pointer;border-radius:var(--radius-sm);transition:all .15s;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(13,15,18,.93);backdrop-filter:blur(12px);flex-wrap:wrap;gap:10px;}
.nav-brand{font-size:15px;font-weight:700;letter-spacing:.06em;}
.nav-brand span{color:var(--accent);}
.nav-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-ghost{font-size:12px;font-weight:500;padding:6px 14px;border:1px solid var(--border2);background:transparent;color:var(--muted);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{font-size:12px;font-weight:500;padding:6px 14px;border:none;background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.85;}
.btn-danger{font-size:11px;padding:4px 10px;border:1px solid rgba(255,92,92,.3);background:transparent;color:var(--red);}
.btn-danger:hover{background:var(--red-bg);}

.container{max-width:1000px;margin:0 auto;padding:24px 16px 60px;}

.ticker-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.ticker-pill{font-family:var(--mono);font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.ticker-pill:hover{border-color:var(--faint);color:var(--text);}
.ticker-pill.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.ticker-pill.add-pill{border-style:dashed;color:var(--faint);border-color:var(--faint);background:transparent;}
.ticker-pill.add-pill:hover{color:var(--muted);border-color:var(--muted);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;animation:fadeUp .25s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card+.card{margin-top:16px;}

.main-grid{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;}
@media(max-width:720px){.main-grid{grid-template-columns:1fr;}}

.hisse-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
.hisse-ticker{font-family:var(--mono);font-size:26px;font-weight:500;}
.hisse-name{font-size:13px;color:var(--muted);margin-top:2px;}
.price-block{text-align:right;}
.price-val{font-family:var(--mono);font-size:28px;font-weight:500;}
.price-chg{display:inline-block;font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:20px;margin-top:5px;font-weight:500;}
.price-chg.up{background:var(--green-bg);color:var(--green);}
.price-chg.down{background:var(--red-bg);color:var(--red);}

.update-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px;padding:12px;background:var(--surface2);border-radius:var(--radius-sm);}
.update-row label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.price-field{font-family:var(--mono);font-size:14px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);color:var(--text);width:120px;outline:none;}
.price-field:focus{border-color:var(--accent);}

.divider{border:none;border-top:1px solid var(--border);margin:18px 0;}
.section-title{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.chart-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;position:relative;transition:border-color .15s;}
.chart-card:hover{border-color:var(--border2);}
.chart-card img{width:100%;display:block;max-height:150px;object-fit:cover;cursor:zoom-in;}
.chart-card-footer{padding:7px 10px;display:flex;align-items:center;justify-content:space-between;}
.chart-label{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;}
.chart-del{background:none;border:none;color:var(--faint);font-size:16px;line-height:1;padding:0 2px;cursor:pointer;}
.chart-del:hover{color:var(--red);}
.upload-box{background:var(--surface2);border:1px dashed var(--faint);border-radius:var(--radius-sm);padding:20px 12px;text-align:center;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:110px;}
.upload-box:hover{border-color:var(--accent);background:var(--accent-bg);}
.upload-box svg{opacity:.4;}
.upload-box span{font-size:12px;color:var(--muted);}
.upload-box small{font-size:10px;color:var(--faint);}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.lightbox.open{display:flex;}
.lightbox img{max-width:94vw;max-height:90vh;border-radius:var(--radius);object-fit:contain;box-shadow:0 0 60px rgba(0,0,0,.6);}
.lb-close{position:fixed;top:18px;right:22px;font-size:30px;color:var(--muted);background:none;border:none;cursor:pointer;line-height:1;padding:4px 8px;}
.lb-close:hover{color:var(--text);}

/* COMMENTS */
.comment-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;margin-bottom:14px;padding-right:2px;}
.comment-list::-webkit-scrollbar{width:3px;}
.comment-list::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px;}
.comment-item{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;border-left:2px solid transparent;position:relative;}
.comment-item.bull{border-left-color:var(--green);}
.comment-item.bear{border-left-color:var(--red);}
.comment-item.neutral{border-left-color:var(--faint);}
.comment-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.sent-label{font-size:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:500;}
.sent-label.bull{color:var(--green);}.sent-label.bear{color:var(--red);}.sent-label.neutral{color:var(--muted);}
.comment-date{font-family:var(--mono);font-size:10px;color:var(--faint);}
.comment-price-tag{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:5px;}
.comment-text{font-size:13px;color:var(--text);line-height:1.55;}
.del-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--faint);font-size:14px;line-height:1;padding:2px 4px;cursor:pointer;}
.del-btn:hover{color:var(--red);}
.empty-state{font-size:12px;color:var(--faint);text-align:center;padding:20px 0;}

.form-section{border-top:1px solid var(--border);padding-top:14px;}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-select,.form-input{font-family:var(--font);font-size:12px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);flex:1;min-width:100px;outline:none;}
.form-select:focus,.form-input:focus{border-color:var(--accent);}
.form-textarea{font-family:var(--font);font-size:13px;width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);resize:vertical;min-height:80px;outline:none;margin-bottom:10px;line-height:1.5;}
.form-textarea:focus{border-color:var(--accent);}
.form-submit{width:100%;font-size:13px;font-weight:500;padding:9px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);}
.form-submit:hover{background:var(--accent);color:#fff;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:min(400px,92vw);animation:fadeUp .2s ease;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;}
.modal label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;margin-top:12px;}
.modal .form-input{width:100%;display:block;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.modal-actions button{flex:1;padding:9px;font-size:13px;}

.no-stock{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
.no-stock .icon{font-size:36px;opacity:.2;margin-bottom:12px;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">HİSSE<span>.</span>TAKİP</div>
  <div class="nav-actions">
    <button class="btn-ghost" id="exportBtn">↓ Dışa Aktar</button>
    <button class="btn-ghost" id="importBtn">↑ İçe Aktar</button>
    <button class="btn-primary" id="openAddModal">+ Hisse Ekle</button>
  </div>
</nav>

<div class="container">
  <div class="ticker-bar" id="tickerBar"></div>
  <div id="stockView"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">×</button>
  <img id="lbImg" src="" alt="" />
</div>

<!-- Modal: Hisse Ekle -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Yeni Hisse Ekle</div>
    <label>Hisse Kodu *</label>
    <input class="form-input" id="m_code" placeholder="THYAO" />
    <label>Şirket Adı *</label>
    <input class="form-input" id="m_name" placeholder="Türk Hava Yolları" />
    <label>Güncel Fiyat (₺)</label>
    <input class="form-input" id="m_price" type="number" step="0.01" placeholder="298.50" />
    <label>Borsa</label>
    <input class="form-input" id="m_exchange" placeholder="BIST" />
    <label>Not (opsiyonel)</label>
    <input class="form-input" id="m_note" placeholder="Kısa not..." />
    <div class="modal-actions">
      <button class="btn-ghost" id="closeAddModal">İptal</button>
      <button class="btn-primary" id="saveModal">Kaydet</button>
    </div>
  </div>
</div>

<!-- Modal: İçe Aktar -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">Veri İçe Aktar</div>
    <label>Dışa aktardığınız JSON dosyasının içeriğini yapıştırın</label>
    <textarea class="form-textarea" id="importText" style="min-height:130px;margin-top:8px" placeholder='{"stocks":{...},"comments":{},"charts":{}}'></textarea>
    <div class="modal-actions">
      <button class="btn-ghost" id="closeImport">İptal</button>
      <button class="btn-primary" id="doImport">İçe Aktar</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" multiple style="display:none" />

<script>
const LS = { stocks:'ht_stocks', comments:'ht_comments', charts:'ht_charts', current:'ht_current' };
function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch{return d;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

let stocks   = load(LS.stocks,   { THYAO:{name:'Türk Hava Yolları',price:'',prevPrice:'',exchange:'BIST',note:''}, GARAN:{name:'Garanti Bankası',price:'',prevPrice:'',exchange:'BIST',note:''} });
let comments = load(LS.comments, {});
let charts   = load(LS.charts,   {});
let current  = localStorage.getItem(LS.current) || Object.keys(stocks)[0] || '';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── TICKERS ───────────────────────────────────────────────
function renderTickers(){
  const bar = document.getElementById('tickerBar');
  bar.innerHTML = '';
  Object.keys(stocks).forEach(t=>{
    const b = document.createElement('button');
    b.className = 'ticker-pill'+(t===current?' active':'');
    b.textContent = t; b.title = stocks[t].name;
    b.onclick = ()=>{ current=t; save(LS.current,t); renderAll(); };
    bar.appendChild(b);
  });
  const add = document.createElement('button');
  add.className='ticker-pill add-pill'; add.textContent='+ Ekle';
  add.onclick=()=>openM('addModal');
  bar.appendChild(add);
}

// ── STOCK VIEW ────────────────────────────────────────────
function renderStockView(){
  const view = document.getElementById('stockView');
  if(!current||!stocks[current]){
    view.innerHTML='<div class="no-stock"><div class="icon">📊</div>Henüz hisse eklenmedi. Sağ üstten ekleyebilirsiniz.</div>';
    return;
  }
  const s = stocks[current];
  const price    = s.price!==''&&s.price!=null ? parseFloat(s.price) : null;
  const prevPrice= s.prevPrice!==''&&s.prevPrice!=null ? parseFloat(s.prevPrice) : null;

  let chgHtml='';
  if(price!==null && prevPrice!==null && prevPrice!==0){
    const p = ((price-prevPrice)/prevPrice*100).toFixed(2);
    chgHtml=`<div class="price-chg ${+p>=0?'up':'down'}">${+p>=0?'+':''}${p}%</div>`;
  }

  view.innerHTML=`
  <div class="main-grid">
    <div>
      <div class="card">
        <div class="hisse-header">
          <div>
            <div class="hisse-ticker">${esc(current)}</div>
            <div class="hisse-name">${esc(s.name)}${s.exchange?' &nbsp;·&nbsp; '+esc(s.exchange):''}</div>
          </div>
          <div class="price-block">
            <div class="price-val">${price!==null?price.toFixed(2)+' ₺':'—'}</div>
            ${chgHtml}
          </div>
        </div>

        <div class="update-row">
          <label>Fiyat güncelle</label>
          <input type="number" class="price-field" id="newPrice" step="0.01" placeholder="Yeni fiyat (₺)" value="${price!==null?price:''}" />
          <button class="btn-ghost" id="updatePriceBtn" style="font-size:12px;padding:6px 14px">Kaydet</button>
          <button class="btn-danger" id="deleteStockBtn" style="margin-left:auto">Hisseyi Sil</button>
        </div>

        ${s.note?`<div style="font-size:12px;color:var(--muted);margin-bottom:16px;padding:9px 12px;background:var(--surface2);border-radius:var(--radius-sm);border-left:2px solid var(--faint)">${esc(s.note)}</div>`:''}

        <div class="divider"></div>
        <div class="section-title">Grafik Görüntüleri</div>
        <div class="charts-grid" id="chartsGrid"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="section-title">Yorumlarım</div>
        <div class="comment-list" id="commentList"></div>
        <div class="form-section">
          <div class="form-row">
            <select class="form-select" id="sentimentSel">
              <option value="bull">▲ Yükseliş</option>
              <option value="bear">▼ Düşüş</option>
              <option value="neutral">→ Nötr</option>
            </select>
            <input class="form-input" id="priceInput" type="number" step="0.01" placeholder="@ Fiyat (₺)" />
          </div>
          <textarea class="form-textarea" id="commentText" placeholder="Notunuzu yazın..."></textarea>
          <button class="form-submit" id="addCommentBtn">Yorum Ekle</button>
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('updatePriceBtn').onclick=()=>{
    const val = document.getElementById('newPrice').value.trim();
    const n = val!==''?parseFloat(val):null;
    if(val!==''&&isNaN(n)) return;
    if(stocks[current].price!==''&&stocks[current].price!=null) stocks[current].prevPrice=stocks[current].price;
    stocks[current].price = n!==null?n:'';
    save(LS.stocks,stocks); renderAll();
  };

  document.getElementById('deleteStockBtn').onclick=()=>{
    if(!confirm(current+' hissesini silmek istiyor musunuz?')) return;
    delete stocks[current]; delete comments[current]; delete charts[current];
    save(LS.stocks,stocks); save(LS.comments,comments); save(LS.charts,charts);
    current=Object.keys(stocks)[0]||'';
    save(LS.current,current); renderAll();
  };

  document.getElementById('addCommentBtn').onclick=addComment;
  renderCharts(); renderComments();
}

// ── CHARTS ────────────────────────────────────────────────
function renderCharts(){
  const grid=document.getElementById('chartsGrid');
  if(!grid) return;
  const list=charts[current]||[];

  grid.innerHTML = list.map((c,i)=>`
    <div class="chart-card">
      <img src="${c.dataUrl}" alt="${esc(c.label)}" data-i="${i}" />
      <div class="chart-card-footer">
        <span class="chart-label" title="${esc(c.label)}">${esc(c.label)}</span>
        <button class="chart-del" data-i="${i}">×</button>
      </div>
    </div>`).join('')+`
    <div class="upload-box" id="uploadBox">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span>Grafik yükle</span>
      <small>PNG · JPG · WEBP · birden fazla seçilebilir</small>
    </div>`;

  grid.querySelectorAll('.chart-card img').forEach(img=>{
    img.onclick=()=>{ document.getElementById('lbImg').src=img.src; document.getElementById('lightbox').classList.add('open'); };
  });
  grid.querySelectorAll('.chart-del').forEach(btn=>{
    btn.onclick=e=>{ e.stopPropagation(); charts[current].splice(+btn.dataset.i,1); save(LS.charts,charts); renderCharts(); };
  });
  document.getElementById('uploadBox').onclick=()=>document.getElementById('fileInput').click();
}

document.getElementById('fileInput').onchange=function(){
  const files=Array.from(this.files); if(!files.length) return;
  let done=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      if(!charts[current]) charts[current]=[];
      charts[current].push({label:file.name.replace(/\.[^.]+$/,'').slice(0,50), dataUrl:e.target.result});
      if(++done===files.length){ save(LS.charts,charts); renderCharts(); }
    };
    r.readAsDataURL(file);
  });
  this.value='';
};

// Lightbox
document.getElementById('lbClose').onclick=()=>document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').onclick=function(e){if(e.target===this)this.classList.remove('open');};
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lightbox').classList.remove('open');});

// ── COMMENTS ─────────────────────────────────────────────
function renderComments(){
  const list=document.getElementById('commentList');
  if(!list) return;
  const tc=(comments[current]||[]).slice().reverse();
  if(!tc.length){list.innerHTML='<div class="empty-state">Henüz yorum eklenmedi.</div>';return;}
  list.innerHTML=tc.map((c,ri)=>{
    const i=(comments[current].length-1)-ri;
    const sl=c.sentiment==='bull'?'Yükseliş':c.sentiment==='bear'?'Düşüş':'Nötr';
    return `<div class="comment-item ${c.sentiment}">
      <button class="del-btn" data-i="${i}">×</button>
      <div class="comment-meta">
        <span class="sent-label ${c.sentiment}">${sl}</span>
        <span class="comment-date">${c.date}</span>
      </div>
      ${c.price?`<div class="comment-price-tag">@ ${esc(c.price)} ₺</div>`:''}
      <div class="comment-text">${esc(c.text).replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.del-btn').forEach(btn=>{
    btn.onclick=()=>{ comments[current].splice(+btn.dataset.i,1); save(LS.comments,comments); renderComments(); };
  });
}

function addComment(){
  const text=document.getElementById('commentText').value.trim();
  if(!text||!current) return;
  const sentiment=document.getElementById('sentimentSel').value;
  const price=document.getElementById('priceInput').value.trim();
  const date=new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'short',year:'numeric'});
  if(!comments[current]) comments[current]=[];
  comments[current].push({text,sentiment,price,date,ts:Date.now()});
  save(LS.comments,comments);
  document.getElementById('commentText').value='';
  document.getElementById('priceInput').value='';
  renderComments();
}

// ── MODALS ────────────────────────────────────────────────
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}

document.getElementById('openAddModal').onclick=()=>openM('addModal');
document.getElementById('closeAddModal').onclick=()=>closeM('addModal');
document.getElementById('addModal').onclick=e=>{if(e.target===e.currentTarget)closeM('addModal');};

document.getElementById('saveModal').onclick=()=>{
  const code=document.getElementById('m_code').value.trim().toUpperCase();
  const name=document.getElementById('m_name').value.trim();
  if(!code||!name){alert('Hisse kodu ve isim zorunludur.');return;}
  const price=document.getElementById('m_price').value.trim();
  stocks[code]={name,price:price!==''?parseFloat(price):'',prevPrice:'',exchange:document.getElementById('m_exchange').value.trim()||'BIST',note:document.getElementById('m_note').value.trim()};
  save(LS.stocks,stocks);
  current=code; save(LS.current,current);
  ['m_code','m_name','m_price','m_exchange','m_note'].forEach(id=>document.getElementById(id).value='');
  closeM('addModal'); renderAll();
};

document.getElementById('importBtn').onclick=()=>openM('importModal');
document.getElementById('closeImport').onclick=()=>closeM('importModal');
document.getElementById('importModal').onclick=e=>{if(e.target===e.currentTarget)closeM('importModal');};
document.getElementById('doImport').onclick=()=>{
  try{
    const d=JSON.parse(document.getElementById('importText').value.trim());
    if(d.stocks){stocks=d.stocks;save(LS.stocks,stocks);}
    if(d.comments){comments=d.comments;save(LS.comments,comments);}
    if(d.charts){charts=d.charts;save(LS.charts,charts);}
    current=Object.keys(stocks)[0]||''; save(LS.current,current);
    document.getElementById('importText').value='';
    closeM('importModal'); renderAll();
  }catch{alert('Geçersiz JSON formatı.');}
};

// ── EXPORT ───────────────────────────────────────────────
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({stocks,comments,charts},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='hisse-takip-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
};

// ── INIT ─────────────────────────────────────────────────
function renderAll(){
  if(!stocks[current]&&Object.keys(stocks).length) current=Object.keys(stocks)[0];
  renderTickers(); renderStockView();
}
renderAll();
</script>
</body>
</html>
